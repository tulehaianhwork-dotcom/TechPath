<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Literacy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #232336;
    --accent: #7c6ff7;
    --accent2: #3ecfb2;
    --accent3: #f7c948;
    --danger: #f76f6f;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --phase-colors: #7c6ff7, #3ecfb2, #f7c948, #f76f6f, #a78bfa, #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-mark span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .user-xp {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .xp-badge {
    background: linear-gradient(135deg, #7c6ff720, #3ecfb220);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
  }

  .sidebar-nav { flex: 1; padding: 12px 0; }

  .phase-group { margin-bottom: 4px; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 0;
    user-select: none;
  }

  .phase-header:hover { background: rgba(255,255,255,0.04); }

  .phase-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .phase-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    flex: 1;
  }

  .phase-chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .phase-group.open .phase-chevron { transform: rotate(90deg); }

  .lesson-list { display: none; }
  .phase-group.open .lesson-list { display: block; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 20px 7px 38px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--muted);
  }

  .lesson-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .lesson-item.active { color: var(--text); background: rgba(124,111,247,0.1); }
  .lesson-item.completed { color: var(--accent2); }
  .lesson-item.locked { opacity: 0.4; cursor: not-allowed; }

  .lesson-status { font-size: 11px; flex-shrink: 0; }

  /* MAIN */
  .main {
    margin-left: 280px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .breadcrumb {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb strong { color: var(--text); font-weight: 500; }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-label { font-size: 12px; color: var(--muted); }

  .progress-bar {
    width: 140px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 40px;
    max-width: 820px;
  }

  /* HOME */
  .home-hero {
    padding: 60px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  .hero-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .hero-title em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-desc {
    font-size: 17px;
    color: var(--muted);
    max-width: 560px;
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #6b5ef0; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .phase-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-top: 48px;
  }

  .phase-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .phase-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .phase-card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 14px;
  }

  .phase-card h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .phase-card p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .phase-card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .lesson-count {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .phase-progress {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
  }

  /* LESSON */
  .lesson-header {
    margin-bottom: 32px;
  }

  .lesson-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lesson-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .meta-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .section {
    margin-bottom: 32px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text);
  }

  .section p {
    color: #b8b8d0;
    line-height: 1.75;
    margin-bottom: 10px;
  }

  .highlight-box {
    background: rgba(124,111,247,0.08);
    border: 1px solid rgba(124,111,247,0.25);
    border-radius: 10px;
    padding: 18px 22px;
    margin: 16px 0;
  }

  .highlight-box p { margin: 0; color: var(--text); }

  .analogy-box {
    background: rgba(62,207,178,0.07);
    border: 1px solid rgba(62,207,178,0.2);
    border-radius: 10px;
    padding: 18px 22px;
    margin: 16px 0;
  }

  .analogy-box .analogy-icon {
    font-size: 22px;
    margin-bottom: 8px;
    display: block;
  }

  .analogy-box p { margin: 0; color: var(--text); }

  .role-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }

  .role-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .role-name {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .role-card p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin: 0;
  }

  .diagram-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    white-space: pre;
    line-height: 1.8;
    overflow-x: auto;
    margin: 16px 0;
  }

  .misconceptions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 12px 0;
  }

  .myth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
  }

  .myth-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .myth-content strong {
    display: block;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .myth-content p { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.5; }

  .takeaway-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 12px 0;
  }

  .takeaway-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: #b8b8d0;
    line-height: 1.5;
  }

  .takeaway-check {
    color: var(--accent2);
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .challenge-box {
    background: linear-gradient(135deg, rgba(124,111,247,0.1), rgba(62,207,178,0.06));
    border: 1px solid rgba(124,111,247,0.3);
    border-radius: 12px;
    padding: 22px;
    margin: 16px 0;
  }

  .challenge-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .challenge-box p { margin: 0; font-size: 14px; color: #b8b8d0; }

  .related-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0;
  }

  .related-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .related-pill:hover { border-color: var(--accent); color: var(--accent); }

  .lesson-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  /* QUIZ */
  .quiz-container { max-width: 720px; }

  .quiz-header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .quiz-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .quiz-meta { font-size: 13px; color: var(--muted); }

  .quiz-progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  .q-dots { display: flex; gap: 6px; }

  .q-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }

  .q-dot.answered { background: var(--accent2); }
  .q-dot.current { background: var(--accent); }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .q-difficulty {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-left: 8px;
  }

  .q-difficulty.easy { background: rgba(62,207,178,0.15); color: var(--accent2); }
  .q-difficulty.medium { background: rgba(247,201,72,0.15); color: var(--accent3); }
  .q-difficulty.hard { background: rgba(247,111,111,0.15); color: var(--danger); }

  .question-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 22px;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
  }

  .option:hover:not(.selected):not(.correct):not(.wrong) {
    border-color: var(--accent);
    background: rgba(124,111,247,0.06);
  }

  .option.selected { border-color: var(--accent); background: rgba(124,111,247,0.1); }
  .option.correct { border-color: var(--accent2); background: rgba(62,207,178,0.1); }
  .option.wrong { border-color: var(--danger); background: rgba(247,111,111,0.08); }

  .option-letter {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .option.selected .option-letter { background: var(--accent); color: white; }
  .option.correct .option-letter { background: var(--accent2); color: white; }
  .option.wrong .option-letter { background: var(--danger); color: white; }

  .option-text { font-size: 14px; color: var(--text); line-height: 1.5; padding-top: 2px; }

  .explanation-box {
    background: rgba(62,207,178,0.06);
    border: 1px solid rgba(62,207,178,0.2);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 12px;
    font-size: 13px;
    color: #b8b8d0;
    line-height: 1.6;
  }

  .explanation-box strong { color: var(--accent2); }

  .quiz-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }

  /* RESULTS */
  .results-container {
    max-width: 600px;
    text-align: center;
  }

  .results-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    border: 3px solid;
  }

  .results-circle.pass { border-color: var(--accent2); box-shadow: 0 0 40px rgba(62,207,178,0.2); }
  .results-circle.fail { border-color: var(--danger); box-shadow: 0 0 40px rgba(247,111,111,0.15); }

  .results-pct {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 40px;
    font-weight: 700;
  }

  .results-circle.pass .results-pct { color: var(--accent2); }
  .results-circle.fail .results-pct { color: var(--danger); }

  .results-label { font-size: 11px; color: var(--muted); }

  .results-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .results-message { font-size: 15px; color: var(--muted); margin-bottom: 28px; }

  .badge-award {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    text-align: left;
  }

  .badge-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .badge-info strong {
    display: block;
    font-size: 16px;
    font-family: 'Space Grotesk', sans-serif;
    margin-bottom: 4px;
  }

  .badge-info p { font-size: 12px; color: var(--muted); margin: 0; }

  .xp-gained {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,111,247,0.15);
    border: 1px solid rgba(124,111,247,0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 24px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .hero-title { font-size: 34px; }
    .content { padding: 24px 20px; }
  }

  /* Tags for AI perspective */
  .ai-box {
    background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(124,111,247,0.04));
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 10px;
    padding: 18px 22px;
    margin: 12px 0;
  }

  .ai-box p { margin: 0; color: #b8b8d0; }

  /* divider */
  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  .text-accent { color: var(--accent); }
  .text-accent2 { color: var(--accent2); }
  .text-muted { color: var(--muted); }

  .inline-code {
    background: rgba(124,111,247,0.15);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-mark">⚡ <span>Tech Literacy</span></div>
      <div class="user-xp">
        <span>Total XP:</span>
        <span class="xp-badge" id="total-xp">0 XP</span>
      </div>
    </div>

    <div class="sidebar-nav" id="sidebar-nav">
      <!-- Generated by JS -->
    </div>
  </nav>

function totalLessons() {
  return CURRICULUM.reduce((s, p) => s + p.lessons.length, 0);
}

function getLessonIndex(lessonId) {
  let idx = 0;
  for (const phase of CURRICULUM) {
    for (const lesson of phase.lessons) {
      if (lesson.id === lessonId) return idx;
      idx++;
    }
  }
  return -1;
}

function isLessonUnlocked(lessonId) {
  const idx = getLessonIndex(lessonId);
  if (idx === 0) return true;
  let prev = null;
  let count = 0;
  for (const phase of CURRICULUM) {
    for (const lesson of phase.lessons) {
      if (count === idx - 1) { prev = lesson.id; break; }
      count++;
    }
    if (prev) break;
  }
  return prev ? state.completed.has(prev) : true;
}

function getLessonMeta(lessonId) {
  for (const phase of CURRICULUM) {
    for (const lesson of phase.lessons) {
      if (lesson.id === lessonId) return { lesson, phase };
    }
  }
  return null;
}

function getContent(lessonId) {
  return LESSON_CONTENT[lessonId] || null;
}

function getQuiz(lessonId) {
  return QUIZZES[lessonId] || null;
}

      <div class="section">
        <div class="section-label">Text Diagram</div>
        <div class="diagram-box">${content.diagram}</div>
      </div>

      <div class="section">
        <div class="section-label">Real-World Examples</div>
        <ul style="list-style:none;display:flex;flex-direction:column;gap:8px">
          ${content.realWorld.map(ex => `<li style="display:flex;gap:10px;align-items:flex-start;font-size:14px;color:#b8b8d0"><span style="color:var(--accent2);flex-shrink:0">→</span><span>${ex.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</span></li>`).join('')}
        </ul>
      </div>

      <div class="section">
        <div class="section-label">Why It Matters at Work</div>
        <div class="role-grid">
          ${Object.entries(content.roles).map(([role, text]) => `
            <div class="role-card">
              <div class="role-name">${role}</div>
              <p>${text}</p>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-label">AI Perspective</div>
        <div class="ai-box"><p>🤖 ${content.ai}</p></div>
      </div>

      <div class="section">
        <div class="section-label">Common Misconceptions</div>
        <div class="misconceptions">
          ${content.misconceptions.map(m => `
            <div class="myth-card">
              <span class="myth-icon">❌</span>
              <div class="myth-content">
                <strong>Myth: "${m.myth}"</strong>
                <p>✓ Reality: ${m.truth}</p>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-label">Key Takeaways</div>
        <div class="takeaway-list">
          ${content.takeaways.map(t => `
            <div class="takeaway-item">
              <span class="takeaway-check">✓</span>
              <span>${t}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-label">Mini Challenge</div>
        <div class="challenge-box">
          <div class="challenge-title">🎯 Your Challenge</div>
          <p>${content.challenge}</p>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Related Concepts</div>
        <div class="related-pills">
          ${content.related.map(r => `<span class="related-pill">${r}</span>`).join('')}
        </div>
      </div>

      <div class="lesson-nav">
        <button class="btn btn-outline" onclick="showHome()">← Back to Home</button>
        <button class="btn btn-primary" onclick="startQuiz('${lessonId}')">
          ${state.completed.has(lessonId) ? '🔄 Retake Quiz' : '📝 Take Quiz'} →
        </button>
      </div>
    </div>
  `;
}

function renderQuiz(lessonId) {
  const meta = getLessonMeta(lessonId);
  const { lesson, phase } = meta;
  const quizData = getQuiz(lessonId) || generateGenericQuiz(lesson);
  const qs = quizData.questions;

  const answeredCount = Object.keys(state.quizAnswers).length;
  
  container.innerHTML = `
    <div class="content">
      <div class="quiz-container">
        <div class="quiz-header">
          <div style="font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:6px">${phase.title} / ${lesson.title}</div>
          <div class="quiz-title">📝 Knowledge Check</div>
          <div class="quiz-meta">10 questions · Pass with 80% or higher</div>
          <div class="quiz-progress">
            <div class="q-dots">
              ${qs.map((_, i) => `<div class="q-dot ${state.quizAnswers[i] !== undefined ? 'answered' : ''}"></div>`).join('')}
            </div>
            <span style="font-size:12px;color:var(--muted);margin-left:8px">${answeredCount}/10 answered</span>
          </div>
        </div>

        ${qs.map((q, i) => {
          const userAnswer = state.quizAnswers[i];
          const isAnswered = userAnswer !== undefined;
          return `
            <div class="question-card" id="q-${i}">
              <div class="q-number">
                Q${i+1} / 10
                <span class="q-difficulty ${q.difficulty}">${q.difficulty}</span>
              </div>
              <div class="question-text">${q.q}</div>
              <div class="options">
                ${q.options.map((opt, j) => {
                  let cls = '';
                  if (state.quizSubmitted) {
                    if (j === q.correct) cls = 'correct';
                    else if (j === userAnswer && userAnswer !== q.correct) cls = 'wrong';
                  } else if (j === userAnswer) {
                    cls = 'selected';
                  }
                  return `
                    <div class="option ${cls}" onclick="${state.quizSubmitted ? '' : `selectAnswer(${i}, ${j})`}">
                      <div class="option-letter">${['A','B','C','D'][j]}</div>
                      <div class="option-text">${opt}</div>
                    </div>
                  `;
                }).join('')}
              </div>
              ${state.quizSubmitted ? `<div class="explanation-box"><strong>💡 Explanation:</strong> ${q.explanation}</div>` : ''}
            </div>
          `;
        }).join('')}

        <div class="quiz-controls">
          <button class="btn btn-outline" onclick="openLesson('${lessonId}')">← Review Lesson</button>
          ${!state.quizSubmitted 
            ? `<button class="btn btn-primary" onclick="submitQuiz('${lessonId}')" ${answeredCount < 10 ? 'style="opacity:0.5"' : ''}>
                Submit ${answeredCount < 10 ? `(${answeredCount}/10)` : 'Quiz'} →
               </button>`
            : `<button class="btn btn-primary" onclick="showResults('${lessonId}')">See Results →</button>`
          }
        </div>
      </div>
    </div>
  `;
}

function renderResults(lessonId) {
  const meta = getLessonMeta(lessonId);
  const { lesson, phase } = meta;
  const quizData = getQuiz(lessonId) || generateGenericQuiz(lesson);
  const qs = quizData.questions;
  
  let correct = 0;
  qs.forEach((q, i) => {
    if (state.quizAnswers[i] === q.correct) correct++;
  });
  
  const pct = Math.round(correct / qs.length * 100);
  const passed = pct >= 80;

  // Find next lesson
  let nextLesson = null;
  let found = false;
  for (const p of CURRICULUM) {
    for (const l of p.lessons) {
      if (found) { nextLesson = l.id; found = false; break; }
      if (l.id === lessonId) found = true;
    }
    if (!found && nextLesson) break;
  }

  if (passed && !state.completed.has(lessonId)) {
    state.completed.add(lessonId);
    state.totalXP += lesson.xp;
    renderSidebar();
    renderTopbar();
  }

  const container = document.getElementById('view-container');
  container.innerHTML = `
    <div class="content">
      <div class="results-container" style="margin:0 auto;padding:40px 0">
        <div class="results-circle ${passed ? 'pass' : 'fail'}">
          <div class="results-pct">${pct}%</div>
          <div class="results-label">${correct}/10 correct</div>
        </div>

        <h2 class="results-title">${passed ? '✅ Lesson Completed!' : '❌ Almost There!'}</h2>
        <p class="results-message">
          ${passed 
            ? `Excellent work! You scored ${pct}% and have unlocked the next lesson.`
            : `You scored ${pct}%. You need at least 80% to unlock the next lesson. Review the lesson and try again.`
          }
        </p>

        ${passed ? `
          <div class="badge-award">
            <div class="badge-icon">${lesson.badge}</div>
            <div class="badge-info">
              <strong>${lesson.achievement}</strong>
              <p>Badge earned for completing ${lesson.title}</p>
            </div>
          </div>
          <div style="margin-bottom:24px">
            <div class="xp-gained">⭐ +${lesson.xp} XP earned</div>
          </div>
        ` : `
          <div style="background:rgba(247,111,111,0.08);border:1px solid rgba(247,111,111,0.2);border-radius:12px;padding:20px;margin-bottom:24px;text-align:left">
            <div style="font-weight:600;margin-bottom:8px;font-family:'Space Grotesk',sans-serif">📚 Recommended Review</div>
            <p style="font-size:13px;color:var(--muted);margin:0">Go back through the lesson, pay attention to the sections you're unsure about, then retake the quiz.</p>
          </div>
        `}

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-outline" onclick="openLesson('${lessonId}')">📖 Review Lesson</button>
          ${!passed ? `<button class="btn btn-primary" onclick="retakeQuiz('${lessonId}')">🔄 Retake Quiz</button>` : ''}
          ${passed && nextLesson ? `<button class="btn btn-primary" onclick="openLesson('${nextLesson}')">Next Lesson →</button>` : ''}
          ${passed && !nextLesson ? `<button class="btn btn-primary" onclick="showHome()">🎓 Complete!</button>` : ''}
        </div>

        <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border)">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:16px">Score Breakdown</div>
          <div style="display:flex;gap:12px;justify-content:center">
            ${['Easy','Medium','Hard'].map(diff => {
              const diffLower = diff.toLowerCase();
              const qs2 = qs.filter(q => q.difficulty === diffLower);
              const correctInDiff = qs2.filter((q, i) => state.quizAnswers[qs.indexOf(q)] === q.correct).length;
              return `<div style="text-align:center;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 20px">
                <div style="font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:${diff==='Easy'?'var(--accent2)':diff==='Medium'?'var(--accent3)':'var(--danger)'}">${correctInDiff}/${qs2.length}</div>
                <div style="font-size:11px;color:var(--muted)">${diff}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

// =====================================================
// ACTIONS
// =====================================================
function togglePhase(phaseId) {
  if (state.expandedPhases.has(phaseId)) {
    state.expandedPhases.delete(phaseId);
  } else {
    state.expandedPhases.add(phaseId);
  }
  renderSidebar();
}

function showHome() {
  state.view = 'home';
  state.currentLesson = null;
  renderTopbar();
  renderSidebar();
  renderHome();
}

function openLesson(lessonId) {
  if (!isLessonUnlocked(lessonId)) {
    alert('🔒 Complete the previous lesson first!');
    return;
  }
  state.view = 'lesson';
  state.currentLesson = lessonId;
  state.quizAnswers = {};
  state.quizSubmitted = false;
  // Auto-expand the phase
  const meta = getLessonMeta(lessonId);
  if (meta) state.expandedPhases.add(meta.phase.id);
  renderTopbar();
  renderSidebar();
  renderLesson(lessonId);
  window.scrollTo(0, 0);
}

function startQuiz(lessonId) {
  state.view = 'quiz';
  state.currentLesson = lessonId;
  state.quizAnswers = {};
  state.quizSubmitted = false;
  renderTopbar();
  renderQuiz(lessonId);
  window.scrollTo(0, 0);
}

function selectAnswer(questionIdx, optionIdx) {
  if (state.quizSubmitted) return;
  state.quizAnswers[questionIdx] = optionIdx;
  renderQuiz(state.currentLesson);
}

function submitQuiz(lessonId) {
  const answered = Object.keys(state.quizAnswers).length;
  if (answered < 10) {
    const remaining = 10 - answered;
    alert(`Please answer all ${remaining} remaining question${remaining > 1 ? 's' : ''} before submitting.`);
    return;
  }
  state.quizSubmitted = true;
  renderQuiz(lessonId);
}

function showResults(lessonId) {
  state.view = 'results';
  renderResults(lessonId);
  window.scrollTo(0, 0);
}

function retakeQuiz(lessonId) {
  state.quizAnswers = {};
  state.quizSubmitted = false;
  state.view = 'quiz';
  renderTopbar();
  renderQuiz(lessonId);
  window.scrollTo(0, 0);
}

function showLockedMsg() {
  alert('🔒 Complete and pass the quiz for the previous lesson to unlock this one.');
}

// =====================================================
// INIT
// =====================================================
const container = document.getElementById('view-container');
renderSidebar();
renderTopbar();
renderHome();
</script>
</body>
</html>
